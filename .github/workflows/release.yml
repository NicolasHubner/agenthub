name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI (PWA)
        working-directory: ui
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build backend
        run: cargo build --release --bin agenthub

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/agenthub/ui
          cp target/release/agenthub dist/agenthub/
          cp -r ui/dist dist/agenthub/ui/dist
          cp scripts/agenthub-start.sh dist/agenthub/
          tar -czf agenthub-${{ matrix.target }}.tar.gz -C dist agenthub

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/agenthub/ui | Out-Null
          Copy-Item target/release/agenthub.exe dist/agenthub/
          Copy-Item -Recurse ui/dist dist/agenthub/ui/dist
          Copy-Item scripts/agenthub-start.ps1 dist/agenthub/
          Compress-Archive -Path dist/agenthub/* -DestinationPath agenthub-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: agenthub-${{ matrix.target }}
          path: agenthub-${{ matrix.target }}.*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: agenthub-${{ matrix.target }}.*
